<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>КИБЕР</title>
<style>
/* ── Reset & Base ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    background: radial-gradient(ellipse at 50% -10%, #0c1a3a 0%, #060810 68%);
    color: #d8e4ff;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    overflow: hidden;
}

/* ── Layout ──────────────────────────────────────────────── */
#app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 6px;
    gap: 5px;
    overflow: hidden;
}

/* ── HUD ─────────────────────────────────────────────────── */
#hud {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 7px 8px 6px;
    background: rgba(8, 14, 32, 0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 28px rgba(0,0,0,0.5);
    flex-shrink: 0;
}
.hud-top { display: flex; gap: 6px; }
.player-panel {
    flex: 1;
    padding: 5px 7px;
    border-radius: 8px;
    background: linear-gradient(155deg, rgba(28,42,88,0.7) 0%, rgba(12,18,44,0.92) 100%);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), 0 2px 8px rgba(0,0,0,0.35);
    transition: border-color 0.25s, box-shadow 0.25s;
    font-size: 12px;
    line-height: 1.4;
}
#p1-panel.active-player { border-color: rgba(68,136,255,0.65); box-shadow: 0 0 20px rgba(68,136,255,0.22), inset 0 1px 0 rgba(100,160,255,0.14); }
#p2-panel.active-player { border-color: rgba(255,85,68,0.65);  box-shadow: 0 0 20px rgba(255,85,68,0.22),  inset 0 1px 0 rgba(255,140,120,0.14); }
#p1-panel .player-label { color: #6699ff; font-weight: 700; font-size: 10px; letter-spacing: 0.08em; }
#p2-panel .player-label { color: #ff6655; font-weight: 700; font-size: 10px; letter-spacing: 0.08em; }
.player-score { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }

/* Score progress bar */
.score-bar-wrap { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 5px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 2px; width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1); }
#p1-panel .score-bar { background: linear-gradient(90deg, #1e4fcc, #4488ff); box-shadow: 0 0 8px #4488ffaa; }
#p2-panel .score-bar { background: linear-gradient(90deg, #bb2211, #ff5544); box-shadow: 0 0 8px #ff5544aa; }

.hud-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    flex-shrink: 0;
    min-width: 64px;
}
#deck-count, #discard-count { font-size: 10px; color: #3a4a66; letter-spacing: 0.03em; }
#phase-label { font-weight: 700; color: #8aabee; font-size: 11px; letter-spacing: 0.05em; }
#turn-label { font-size: 10px; color: #556688; }

/* ── Phase hint bar ───────────────────────────────────────── */
#phase-hint {
    flex-shrink: 0;
    position: relative;
    isolation: isolate;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    font-size: 13px;
    font-weight: 600;
    color: #25C8F3;
    text-align: center;
    min-height: 44px;
    letter-spacing: 0.05em;
    transition: color 0.35s ease;
}
#phase-hint::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background-image: url('progress-bar.svg');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    filter: hue-rotate(var(--hint-hue, 0deg)) saturate(var(--hint-sat, 1)) brightness(var(--hint-bri, 1));
    transition: filter 0.45s ease;
}

/* ── Revealed zones ──────────────────────────────────────── */
.revealed-zone {
    display: flex; gap: 4px; overflow-x: auto;
    padding: 2px 0; min-height: 44px; flex-shrink: 0; scrollbar-width: none;
}
.revealed-zone::-webkit-scrollbar { display: none; }
.zone-label { font-size: 9px; color: #2e3a4e; margin-bottom: 1px; padding-left: 2px; letter-spacing: 0.06em; }
.revealed-wrap { flex-shrink: 0; }
.revealed-wrap.collapsed { display: none; }

/* ── Keyframe Animations ─────────────────────────────────── */
@keyframes node-p1-pulse {
    0%, 100% { box-shadow: 0 0 10px #4488ffaa, 0 0 3px #2255cc, inset 0 1px 0 rgba(255,255,255,0.25); }
    50%       { box-shadow: 0 0 26px #4488ffee, 0 0 8px #5599ff, inset 0 1px 0 rgba(255,255,255,0.35); }
}
@keyframes node-p2-pulse {
    0%, 100% { box-shadow: 0 0 10px #ff5544aa, 0 0 3px #cc3322, inset 0 1px 0 rgba(255,255,255,0.2); }
    50%       { box-shadow: 0 0 26px #ff5544ee, 0 0 8px #ff6655, inset 0 1px 0 rgba(255,255,255,0.3); }
}
@keyframes card-float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-4px); }
}
@keyframes panel-slide-in {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
@keyframes glitch-text {
    0%   { transform: translateX(0);    text-shadow: none; }
    15%  { transform: translateX(-4px); text-shadow:  3px 0 #4488ff; }
    30%  { transform: translateX( 4px); text-shadow: -3px 0 #ff5544; }
    45%  { transform: translateX(-2px); text-shadow: 2px 0 #4488ff, -2px 0 #ff5544; }
    60%  { transform: translateX( 1px); text-shadow: none; }
    75%  { transform: translateX(-1px); }
    100% { transform: translateX(0);    text-shadow: none; }
}

/* ── Board ───────────────────────────────────────────────── */
#board-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0;
}
#board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    padding: 14px;
    background: linear-gradient(145deg, #08101e 0%, #0b1326 55%, #070e1c 100%);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow:
        inset 0 0 50px rgba(0,0,0,0.7),
        inset 0 0 100px rgba(8,16,50,0.4),
        0 12px 44px rgba(0,0,0,0.75);
    width: min(100%, calc(100dvh * 0.38));
    aspect-ratio: 1;
}
.node {
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    aspect-ratio: 1;
    position: relative;
}
.node.empty {
    background: radial-gradient(circle at 42% 35%, #1b294a, #0f1a32);
    border: 1px solid rgba(44,70,140,0.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 4px rgba(0,0,0,0.45);
}
.node.p1 {
    background: radial-gradient(circle at 35% 30%, #88aaff, #2255cc);
    border: 1px solid rgba(100,160,255,0.75);
    box-shadow: 0 0 12px #4488ffaa, 0 0 4px #2255cc, inset 0 1px 0 rgba(255,255,255,0.3);
    animation: node-p1-pulse 3s ease-in-out infinite;
}
.node.p2 {
    background: radial-gradient(circle at 35% 30%, #ff9988, #cc3322);
    border: 1px solid rgba(255,130,110,0.75);
    box-shadow: 0 0 12px #ff5544aa, 0 0 4px #cc3322, inset 0 1px 0 rgba(255,255,255,0.25);
    animation: node-p2-pulse 3s ease-in-out infinite;
}
.node:nth-child(4n+2) { animation-delay: 0.35s; }
.node:nth-child(4n+3) { animation-delay: 0.70s; }
.node:nth-child(4n+4) { animation-delay: 1.05s; }
.node.highlighted {
    box-shadow: 0 0 0 3px #ffcc44, 0 0 20px #ffcc4488;
    transform: scale(1.1);
    z-index: 1;
    animation: none;
}
.node.selected-node { opacity: 0.45; }
.node:active { transform: scale(0.88); }

/* ── Action Buttons ──────────────────────────────────────── */
#action-bar { display: flex; gap: 6px; flex-shrink: 0; }
.btn {
    flex: 1;
    padding: 11px 6px;
    border: none;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    color: #fff;
    font-family: inherit;
    letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.94); opacity: 0.8; }
.btn-action  { background: linear-gradient(155deg, #2c6ee0, #1844a8); box-shadow: 0 4px 18px rgba(34,90,200,0.5),  inset 0 1px 0 rgba(255,255,255,0.15); }
.btn-utilize { background: linear-gradient(155deg, #c06a10, #7a3d00); box-shadow: 0 4px 18px rgba(160,80,0,0.45),   inset 0 1px 0 rgba(255,255,255,0.13); }
.btn-skip    { background: linear-gradient(155deg, #5c2a9a, #2c1460); box-shadow: 0 4px 18px rgba(70,20,140,0.5),  inset 0 1px 0 rgba(255,255,255,0.1); }

/* ── Placement Panel ─────────────────────────────────────── */
#placement-panel:not(.hidden) {
    animation: panel-slide-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#placement-panel {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(7, 12, 28, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 8px;
    border-radius: 10px;
    border: 1px solid rgba(70,100,200,0.32);
    box-shadow: 0 4px 22px rgba(0,0,0,0.55);
    flex-shrink: 0;
}
#placement-panel.hidden { display: none; }
.btn-nav {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(18,28,64,0.85);
    border: 1px solid rgba(70,100,180,0.4);
    color: #7788bb;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
}
.btn-nav:active { background: rgba(40,60,140,0.85); color: #aaccff; }
#placement-count { color: #7a8ecc; font-size: 11px; min-width: 72px; text-align: center; letter-spacing: 0.03em; }
#btn-confirm {
    padding: 8px 10px;
    background: linear-gradient(155deg, #228833, #145520);
    border: none; border-radius: 8px; color: #fff;
    font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 3px 14px rgba(30,140,50,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
}
#btn-synth {
    padding: 6px 10px;
    background: linear-gradient(155deg, #5533bb, #2e1880);
    border: none; border-radius: 8px; color: #cc99ff;
    font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 3px 12px rgba(80,40,200,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
}
#btn-synth-cancel {
    padding: 5px 10px;
    background: rgba(80,10,20,0.7);
    border: 1px solid rgba(200,50,70,0.3);
    border-radius: 8px; color: #ff8899; font-size: 11px; cursor: pointer; font-family: inherit;
}

/* Synth order panel */
#synth-order-panel {
    background: rgba(7, 12, 28, 0.92);
    border: 1px solid rgba(80,40,200,0.45);
    border-radius: 12px; padding: 10px;
    display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    box-shadow: 0 4px 22px rgba(60,20,160,0.35);
}
#synth-order-panel.hidden { display: none; }
.synth-order-title { font-size: 10px; color: #aa88ff; text-align: center; font-weight: 700; letter-spacing: 0.07em; }
.synth-order-btn {
    padding: 8px 12px;
    background: linear-gradient(155deg, rgba(28,14,68,0.95), rgba(16,8,42,0.98));
    border: 1px solid rgba(80,40,200,0.55);
    border-radius: 8px; color: #cc99ff; font-size: 12px; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: background 0.15s;
}
.synth-order-btn:active { background: linear-gradient(155deg, rgba(50,26,100,0.95), rgba(28,12,60,0.98)); }
.synth-order-name { color: #e0d4ff; font-weight: 700; }
.synth-order-arrow { color: #7755cc; }

/* ── Hand ────────────────────────────────────────────────── */
#hand-wrap { flex-shrink: 0; max-height: 160px; }
#hand-cards, .revealed-zone {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 2px; scrollbar-width: none;
}
#hand-cards::-webkit-scrollbar { display: none; }

/* ── Card ────────────────────────────────────────────────── */
.card {
    flex-shrink: 0;
    width: 120px;
    background: linear-gradient(155deg, #192248 0%, #0d1432 100%);
    border: 1px solid rgba(55,85,165,0.5);
    border-radius: 10px;
    padding: 5px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    user-select: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.07);
}
.card.playable {
    border-color: rgba(34,187,80,0.78);
    box-shadow: 0 0 20px rgba(34,187,68,0.35), 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.09);
    animation: card-float 2.5s ease-in-out infinite;
}
.card.unplayable { opacity: 0.28; filter: grayscale(0.65); }
.card.selected {
    border-color: rgba(255,204,68,0.92);
    transform: translateY(-8px);
    box-shadow: 0 8px 30px rgba(255,204,68,0.38), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: none;
}
.card:active { transform: scale(0.94); }
.card-cost {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.55);
}
.card-name {
    font-size: 10px; font-weight: 700; margin-bottom: 3px;
    color: #ccd8ff; line-height: 1.2; min-height: 24px;
    padding-right: 16px; letter-spacing: 0.03em; overflow-wrap: anywhere;
}
.card-pattern { display: flex; justify-content: center; margin: 3px 0; }
.card-fx { font-size: 10px; color: #5a6a8a; line-height: 1.4; }
.fx-play  { color: #55bb77; }
.fx-util  { color: #cc9933; }
.fx-synth { color: #aa77ee; }
.fx-none  { color: #2a3040; }

/* ── Fullscreen Overlays ─────────────────────────────────── */
.overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 24px; gap: 20px; text-align: center;
}
.overlay.hidden { display: none; }

/* Handoff */
#handoff-screen { background: rgba(3, 5, 12, 0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
#handoff-content { display: flex; flex-direction: column; gap: 10px; align-items: center; }
#handoff-player { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
#handoff-summary { font-size: 13px; color: #556688; line-height: 1.7; }
#handoff-next { font-size: 24px; font-weight: 800; color: #c8dcff; margin-top: 14px; line-height: 1.35; letter-spacing: -0.3px; }
#handoff-next.glitch { animation: glitch-text 0.65s steps(1); }
#btn-handoff-ok {
    padding: 16px 52px;
    background: linear-gradient(155deg, #2c6ee0, #1844a8);
    border: none; border-radius: 14px; color: #fff;
    font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 26px rgba(34,90,200,0.55), inset 0 1px 0 rgba(255,255,255,0.16);
    letter-spacing: 0.03em;
}

/* Game Over */
#gameover-screen { background: rgba(3, 5, 12, 0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
#gameover-text { font-size: 24px; font-weight: 800; color: #ffdd88; line-height: 1.4; letter-spacing: -0.5px; }
#btn-play-again {
    padding: 16px 52px;
    background: linear-gradient(155deg, #2a8833, #165520);
    border: none; border-radius: 14px; color: #fff;
    font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 26px rgba(30,140,50,0.55), inset 0 1px 0 rgba(255,255,255,0.16);
}

/* Card Pick Modal */
#card-pick-modal { background: rgba(3, 5, 12, 0.95); backdrop-filter: blur(20px); }
#card-pick-modal.hidden { display: none; }
.modal-box {
    background: linear-gradient(155deg, #0e1a38 0%, #090e22 100%);
    border: 1px solid rgba(70,110,210,0.28);
    border-radius: 18px; padding: 16px; width: 100%; max-width: 400px; max-height: 70dvh;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.06);
}
#card-pick-title { font-size: 14px; font-weight: 700; color: #9ab8ff; letter-spacing: 0.04em; }
#card-pick-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.pick-item {
    padding: 10px 12px;
    background: rgba(18,28,58,0.85);
    border: 1px solid rgba(55,85,165,0.38);
    border-radius: 10px; cursor: pointer; font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
    display: flex; flex-direction: row; align-items: flex-start; gap: 10px;
}
.pick-item.selected { border-color: rgba(68,136,255,0.85); background: rgba(28,48,120,0.75); }
.pick-item-header { font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.pick-cost { font-size: 11px; color: #5566aa; margin-left: 8px; }
.pick-item-pattern { flex-shrink: 0; }
.pick-item-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.pick-item-fx { font-size: 10px; color: #5566aa; line-height: 1.4; }
#card-pick-count { color: #5566aa; font-size: 12px; }
#card-pick-confirm {
    padding: 12px;
    background: linear-gradient(155deg, #2c6ee0, #1844a8);
    border: none; border-radius: 10px; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(34,90,200,0.45);
}
#card-pick-confirm:disabled { background: rgba(16,24,52,0.7); color: #334; cursor: default; box-shadow: none; }

/* Card Detail */
#card-detail { background: rgba(3, 5, 12, 0.95); backdrop-filter: blur(20px); }
#card-detail.hidden { display: none; }
.detail-box {
    background: linear-gradient(155deg, #0e1a38 0%, #090e22 100%);
    border: 1px solid rgba(70,110,210,0.28);
    border-radius: 18px; padding: 22px; width: 100%; max-width: 320px;
    text-align: center; display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.07);
}
#detail-name { font-size: 20px; font-weight: 800; color: #d4e2ff; letter-spacing: 0.04em; }
#detail-cost { color: #4a5a80; font-size: 12px; }
#detail-pattern { display: flex; justify-content: center; }
#detail-pattern svg { width: 96px; height: 96px; }
#detail-effects { font-size: 13px; line-height: 1.9; color: #8899bb; }
#card-detail-close {
    padding: 12px;
    background: rgba(24,34,72,0.85);
    border: 1px solid rgba(70,100,180,0.35);
    border-radius: 10px; color: #7788bb; font-size: 14px; cursor: pointer; font-family: inherit;
}

/* Toast */
#toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(16,24,52,0.96);
    border: 1px solid rgba(70,100,180,0.45);
    color: #8899bb; padding: 10px 20px; border-radius: 20px;
    font-size: 12px; z-index: 200; pointer-events: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 18px rgba(0,0,0,0.55);
}
#toast.hidden { display: none; }
</style>
</head>
<body>
<div id="app">

    <!-- HUD -->
    <div id="hud">
        <div class="hud-top">
            <div class="player-panel" id="p1-panel">
                <div class="player-label">ИГРОК 1</div>
                <div class="player-score" id="p1-score">0 / 15</div>
                <div class="score-bar-wrap"><div class="score-bar" id="p1-bar"></div></div>
                <div id="p1-supply">Запас: 3</div>
                <div id="p1-chips">Фишки: 0/8</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0">
                <div id="deck-count" style="font-size:11px;color:#556">Колода: 53</div>
                <div id="discard-count" style="font-size:11px;color:#556">Сброс: 0</div>
                <div id="phase-label" style="font-size:12px">Восполнение</div>
                <div id="turn-label" style="font-size:11px;color:#8899bb">Ход Игрока 1</div>
            </div>
            <div class="player-panel" id="p2-panel">
                <div class="player-label" style="text-align:right">ИГРОК 2</div>
                <div class="player-score" id="p2-score" style="text-align:right">0 / 15</div>
                <div class="score-bar-wrap"><div class="score-bar" id="p2-bar"></div></div>
                <div id="p2-supply" style="text-align:right">Запас: 3</div>
                <div id="p2-chips" style="text-align:right">Фишки: 0/8</div>
            </div>
        </div>
    </div>

    <!-- Phase hint bar -->
    <div id="phase-hint"></div>

    <!-- Opponent's revealed cards -->
    <div id="opp-revealed-wrap" class="revealed-wrap">
        <div class="zone-label" id="opp-revealed-label">Раскрытые карты Игрока 2</div>
        <div class="revealed-zone" id="opp-revealed"></div>
    </div>

    <!-- Board -->
    <div id="board-wrap">
        <div id="board"></div>
    </div>

    <!-- Own revealed cards -->
    <div id="own-revealed-wrap" class="revealed-wrap">
        <div class="zone-label" id="own-revealed-label">Мои раскрытые карты</div>
        <div class="revealed-zone" id="own-revealed"></div>
    </div>

    <!-- Hand -->
    <div id="hand-wrap">
        <div class="zone-label" id="hand-label">Рука Игрока 1</div>
        <div id="hand-cards"></div>
    </div>

    <!-- Placement panel -->
    <div id="placement-panel" class="hidden">
        <button class="btn-nav" id="btn-prev">‹</button>
        <span id="placement-count">Позиция 1 из 1</span>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
            <button id="btn-confirm">Разыграть!</button>
            <button id="btn-synth">⊕ Синтез</button>
            <button id="btn-synth-cancel" style="display:none">✕ Отмена синтеза</button>
        </div>
        <button class="btn-nav" id="btn-next">›</button>
    </div>

    <!-- Synth order panel -->
    <div id="synth-order-panel" class="hidden">
        <div class="synth-order-title">Порядок эффектов синтеза:</div>
        <button class="synth-order-btn" id="btn-order-a"></button>
        <button class="synth-order-btn" id="btn-order-b"></button>
    </div>

    <!-- Action buttons -->
    <div id="action-bar">
        <button class="btn btn-action" id="btn-end-action" style="display:none">✓ Конец действий</button>
        <button class="btn btn-utilize" id="btn-utilize" style="display:none">⊗ Утилизировать</button>
        <button class="btn btn-skip" id="btn-skip" style="display:none">⏭ Завершить ход</button>
    </div>

</div><!-- /app -->

<!-- Handoff screen -->
<div class="overlay hidden" id="handoff-screen">
    <div id="handoff-content">
        <div id="handoff-player"></div>
        <div id="handoff-summary"></div>
        <div id="handoff-next"></div>
    </div>
    <button id="btn-handoff-ok">Готов! ✓</button>
</div>

<!-- Game over screen -->
<div class="overlay hidden" id="gameover-screen">
    <div id="gameover-text">Победитель: Игрок 1!</div>
    <button id="btn-play-again">Играть снова</button>
</div>

<!-- Card pick modal -->
<div class="overlay hidden" id="card-pick-modal">
    <div class="modal-box">
        <div id="card-pick-title">Выберите карты</div>
        <div id="card-pick-list"></div>
        <div id="card-pick-count">Выбрано: 0 / 1</div>
        <button id="card-pick-confirm" disabled>Подтвердить</button>
    </div>
</div>

<!-- Card detail overlay -->
<div class="overlay hidden" id="card-detail">
    <div class="detail-box">
        <div id="detail-name">БАЙТ</div>
        <div id="detail-cost">Стоимость: 0</div>
        <div id="detail-pattern"></div>
        <div id="detail-effects"></div>
        <button id="card-detail-close">Закрыть</button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<script src="game.js"></script>
<script src="ui.js"></script>
</body>
</html>
